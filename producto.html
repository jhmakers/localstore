<head>
<meta charset="UTF-8">

<title>Producto</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
 font-family: 'Inter', sans-serif;
  margin:0;
  padding:10px;
  background: linear-gradient(
    160deg,
    #0c1020,
    #141b2d,
    #1e293b
  );
  color:#ffffff;
}


.producto-box{
  max-width:600px;
  width:100%;
  margin:auto;
  padding:20px;
  border-radius:18px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}


/* IMAGEN PRINCIPAL */
.img-principal{
  width:100%;
  height:auto;
  display:block;
  border-radius:10px;
}


/* GALERÍA */
.galeria{
  display:flex;
  gap:8px;
  margin-top:10px;
  overflow-x:auto;
  padding-bottom:5px;
}

.galeria img{
  width:70px;
  height:70px;
  min-width:70px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  border:2px solid transparent;
}

.galeria img:active,
.galeria img:hover{
  border-color:#ff9800;
}

/* TEXTO */
h2{
  font-size:clamp(18px, 4vw, 22px);
  margin:12px 0 5px;
}

.precio{
  font-size:clamp(20px, 5vw, 24px);
  font-weight:bold;
  margin:8px 0;
}

.descripcion{
  font-size:clamp(14px, 3.8vw, 16px);
  line-height:1.5;
  color:#cccccc;
}

/* BOTÓN CARRITO */
.btn-agregar{
  width:100%;
  padding:14px;
  background: linear-gradient(135deg, #2563eb, #3b82f6);
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition: all .3s ease;
}

.btn-agregar:hover{
  transform: translateY(-2px);
  box-shadow:0 10px 25px rgba(37,99,235,0.5);
}


.btn-agregar:active{
  transform:scale(.98);
}

/* 🔑 BOTÓN ADMIN */
.admin-login-btn{
  position: fixed;
  top: 12px;
  right: 12px;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border:none;
  background:#ccc;
  opacity:.6;
  cursor:pointer;
  z-index:1000;
}

.admin-login-btn.admin-activo{
  background:#28a745;
  opacity:1;
  color:#fff;
}


/* 📱 TABLET */
@media (min-width:768px){
  .producto-box{
    padding:20px;
  }
}

/* 🖥️ PC */
@media (min-width:1024px){
  .producto-box{
    max-width:700px;
  }
}

.galeria img.admin{
  outline:2px dashed red;
}


#toggleCarritoBtn{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#25D366;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:30px;
  cursor:pointer;
  z-index:999;
}

.carrito{
  position: fixed;
  top: 210px;
  right: 0;
  width: 250px;
  max-width: 90vw;
  height: 55vh;
  background: rgba(20,25,45,0.95);backdrop-filter: blur(12px);-webkit-backdrop-filter: blur(12px);
  color:#fff;
  display:flex;
  flex-direction:column;
  transform: translateX(100%);
  transition: transform .3s ease;
  z-index:1000;
}


.carrito.abierto{
  transform: translateX(0);
}

.carrito-header,
.carrito-footer{
  padding:10px;
  border-bottom:1px solid #444;
}

.carrito-footer{
  border-top:1px solid #444;
}

.carrito-body{
  flex:1;
  overflow-y:auto;
}

#lista-carrito{
  list-style:none;
  padding:0;
  margin:0;
}

#lista-carrito li{
  padding:8px;
  border-bottom:1px dashed #555;
  font-size:13px;
}

.total-carrito{
  font-size:16px;
  text-align:center;
  margin-bottom:8px;
   color: #FFD700; /* amarillo dorado */
  font-weight: bold; /* opcional, para resaltar más */
}

.btn-vaciar{
  flex: 1;
  padding:12px;
  background:#dc3545;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:15px;
  cursor:pointer;
}

.btn-comprar{
  flex: 1;
  padding:12px;
  background:#28a745;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:15px;
  cursor:pointer;
}


.btn-comprar:active{
  transform:scale(.97);
}

.carrito-acciones{
  display: flex;
  gap: 8px;
}

#lista-carrito button {
  background: #444;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 6px 10px;   /* tamaño más grande */
  font-size: 10px;     /* símbolo más grande */
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.1s;
}

#lista-carrito button:hover {
  background: #555;
  transform: scale(1.1);
}

/* Opcional: hacer que solo el botón ❌ tenga un color diferente */
#lista-carrito button:last-child {
  background: #444;  /* rojo */
  color: #fff;
}


#lista-carrito span{
  min-width:16px;
  text-align:center;
}
#lista-carrito small{
  color:#aaa;
  font-size:11px;
}


/* 🗑️ EFECTO BOTÓN VACIAR CARRITO */
.btn-vaciar{
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.btn-vaciar:active{
  transform: scale(0.9);
  box-shadow: inset 0 3px 8px rgba(0,0,0,0.35);
}

/* pequeño shake de advertencia */
@keyframes shake{
  0% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  50% { transform: translateX(3px); }
  75% { transform: translateX(-3px); }
  100% { transform: translateX(0); }
}

.btn-vaciar.shake{
  animation: shake 0.25s;
}

.img-container{
  position:relative;
  display:inline-block;
  width:100%;
}

.fullscreen-icon{
  position:absolute;
  top:8px;
  left:8px;   /* 👈 ahora va al lado izquierdo */
  background:rgba(0,0,0,0.3);
  color:#fff;
  font-size:16px;
  padding:6px 8px;
  border-radius:8px;
  cursor:pointer;
  transition:all .2s ease;
}

.fullscreen-icon:hover{
  background:rgba(0,0,0,0.6);
  transform:scale(1.1);
}

.visor-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:#000;
  display:none;
  z-index:99999;

  justify-content:center;
  align-items:center;
}

.visor-overlay img{
  max-width:100vw;
  max-height:100vh;
  object-fit:contain;
}

.visor-overlay.activo{
  display:flex;
}

.producto-box{
  padding-bottom: 80px; /* espacio para que no choque con botón flotante */
}

h1{
  font-weight:600;
  letter-spacing:.5px;
}

h2{
  font-weight:600;
  letter-spacing:.3px;
}

.nombre-prod{

.nombre-carrito {

/* Precio del producto en el carrito */
.precio-carrito {

.btn-video::before{
  content:"";
  position:absolute;

  }

      12px 12px;
    opacity:.42;
  }

  68%{

      8px 8px,
      12px 12px,
      6px 6px,
      10px 10px,
      7px 7px,
      10px 10px;
    opacity:0;
  }
}
.btn-video span,
.btn-video{
  z-index:1;
}

.btn-video:hover{

<script>




// Arreglo global
let redesSociales = [];

// Mostrar redes en admin
function renderRedesAdmin(){
  const lista = document.getElementById("listaRedes");
  if(!lista) return;

  lista.innerHTML = redesSociales.map((r, index) => `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:6px">
        <img src="${r.icono}" width="24" height="24" style="border-radius:4px">
        <span>${r.nombre}</span>
      </div>
      <button onclick="eliminarRed(${index})" style="background:#dc3545;color:#fff;border:none;border-radius:6px;padding:4px 6px;cursor:pointer">
        ❌
      </button>
    </div>
  `).join("");
}

// Mostrar redes en cliente
function renderRedesProducto(){

  let cont = document.getElementById("redesContainer");

  if(!cont){
    cont = document.createElement("div");
    cont.id = "redesContainer";
    cont.style.marginTop = "12px";

    // 🔥 AHORA VA DESPUÉS DEL BOTÓN DE VIDEO
    const videoBtn = document.getElementById("videoBtn");
    videoBtn.after(cont);
  }

  cont.innerHTML = redesSociales.map(r=>`
    <a href="${r.url}" target="_blank" style="margin-right:8px;display:inline-block">
      <img src="${r.icono}" width="32" height="32"
           style="border-radius:6px;transition:transform .2s"
           onmouseover="this.style.transform='scale(1.1)'"
           onmouseout="this.style.transform='scale(1)'">
    </a>
  `).join("");
}

// Cargar redes desde Firebase
function cargarRedes() {
  db.collection("config").doc("redes2").get()
    .then(doc => {
      redesSociales = (doc.exists && doc.data().redes) ? doc.data().redes : [];
      renderRedesAdmin();
      renderRedesProducto();
    })
    .catch(err => console.error("❌ Error cargando redes sociales:", err));
}

// Agregar red social
async function agregarRed(){
  const nombre = document.getElementById("nombreRed").value.trim();
  const url = document.getElementById("urlRed").value.trim();
  const file = document.getElementById("iconRed").files[0];

  if(!nombre || !url){
    alert("❌ Ingresa nombre y URL");
    return;
  }

  let iconoURL = "https://via.placeholder.com/24";
  if(file){
    iconoURL = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  redesSociales.push({nombre, url, icono: iconoURL});

  db.collection("config").doc("redes2")
    .set({redes: redesSociales})
    .then(() => {
      renderRedesAdmin();
      renderRedesProducto();
      alert("✅ Red social guardada correctamente");

      // limpiar inputs
      document.getElementById("nombreRed").value = "";
      document.getElementById("urlRed").value = "";
      document.getElementById("iconRed").value = "";
    })
    .catch(err => console.error("❌ Error guardando en Firebase:", err));
}

// Eliminar red social
function eliminarRed(index){
  if(!confirm("¿Eliminar esta red?")) return;
  redesSociales.splice(index, 1);

  db.collection("config").doc("redes2").set({redes: redesSociales})
    .then(() => {
      renderRedesAdmin();
      renderRedesProducto();
    })
    .catch(err => console.error("❌ Error eliminando red:", err));
}

// Llamar al cargar la página
document.addEventListener("DOMContentLoaded", () => {
  cargarRedes();
});


// Mostrar redes en admin
function renderRedesAdmin() {
  const cont = document.getElementById("listaRedes");
  cont.innerHTML = redesSociales.map((r, i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:6px">
        <img src="${r.icono}" width="24" height="24" style="border-radius:6px">
        <span>${r.nombre}</span>

      <button onclick="eliminarRed(${i})" style="background:red;color:#fff;border:none;border-radius:6px;padding:2px 6px;cursor:pointer">❌</button>
    </div>
  `).join("");
}

function comprimirImagen(file, calidad = 0.75, maxWidth = 1200) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const ratio = img.width / img.height;
        const canvas = document.createElement("canvas");

        canvas.width = Math.min(img.width, maxWidth);
        canvas.height = canvas.width / ratio;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(
          blob => resolve(blob),
          "image/jpeg",
          calidad
        );
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function subirImagenes(e){
  const files = Array.from(e.target.files);
  if(!files.length) return;

  for(const file of files){
    // Comprimir imagen
    const comprimido = await comprimirImagen(file, 0.75, 1200);

    // Leer como base64 usando Promise
    const base64 = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = ev => resolve(ev.target.result);
      reader.readAsDataURL(comprimido);
    });

    // Si no hay imagen principal, la asignamos
    if(!producto.imagen){
      producto.imagen = base64;
      document.getElementById("imgPrincipal").src = producto.imagen;
    } else {
      producto.imagenes.push(base64);
    }
  }

  // Guardar en Firestore solo UNA vez
  await db.collection("productos").doc(producto.id).update({
    imagen: producto.imagen,
    imagenes: producto.imagenes
  });

  renderGaleria();
  alert("✅ Todas las imágenes se guardaron correctamente");
}

    };

  }

  /* 2️⃣ IMÁGENES ADICIONALES */
  producto.imagenes.forEach((img, index)=>{
    const i = document.createElement("img");
    i.src = img;

    if(esAdmin){
      i.classList.add("admin");
    }

    i.onclick = ()=>{
      if(esAdmin){
        eliminarImagen(index);
      } else {
        imgPrincipal.src = img;
      }
    };

    galeria.appendChild(i);
  });
}
