<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Boletas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#0c1020;
  color:#fff;
  padding:20px;
}

h1{
  text-align:center;
}

.box{
  max-width:500px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}


input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
}


.isla{
  background: linear-gradient(135deg, #1e40af, #0f172a);
  padding:5px; /* 👈 más pegado */
  border-radius:12px;
}

</style>
</head>

<body>

<div id="loginBoletas" class="box">
  <h2>🔐 Acceso a Boletas</h2>
  <input type="password" id="passBoletas" placeholder="Ingrese contraseña">
  <button onclick="verificarAcceso()">Ingresar</button>
</div>


<div id="contenidoBoletas" style="display:none;">

  <button onclick="cerrarSesion()" 

    style="position:fixed;top:15px;right:15px;background:#dc3545;color:#fff;border:none;padding:10px 12px;border-radius:8px;z-index:1000;">
    🔓
  </button>
  <button onclick="irHistorial()" 
  style="position:fixed;top:60px;right:15px;background:#2563eb;color:#fff;border:none;padding:10px;border-radius:8px;z-index:1000;">
  📊
</button>

  <h1>🧾 Generador de Boletas</h1>

  <div class="box">

  <h3>👤 Datos del cliente</h3>

  <input id="clienteNombre" placeholder="Nombre completo">
  <input id="clienteDni" placeholder="DNI">
  <input id="clienteDireccion" placeholder="Dirección">
  <input id="clienteCelular" placeholder="Celular">

  <button onclick="generarBoleta()">🧾 Generar Boleta</button>


</div>

<div id="boletaResultado" class="box" style="margin-top:20px; display:none;"></div>
<div id="accionesBoleta" style="display:none; margin-top:10px;">
  <button onclick="descargarImagen()">🖼️ Descargar Imagen</button>
  <button onclick="descargarPDF()">📄 Descargar PDF</button>
</div>
</div>



<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>



<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>


  let nombreTienda = "";
let logoTienda = "";


const firebaseConfig = {
  apiKey: "AIzaSyDYjGgEc599if7hQG7Qd2wF7-vlSynBDNU",
  authDomain: "jhmaker-6b092.firebaseapp.com",
  projectId: "jhmaker-6b092",
  storageBucket: "jhmaker-6b092.firebasestorage.app",
  messagingSenderId: "231063273884",
  appId: "1:231063273884:web:e163c609fbdefe46ff8859"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let adminPassword = "1234";

// 🔑 cargar contraseña desde Firebase
async function cargarPassword(){
  try{
    const doc = await db.collection("config").doc("admin").get();
    if(doc.exists && doc.data().password){
      adminPassword = doc.data().password;
    }
  }catch(err){
    console.error(err);
  }
}

// 🔐 verificar acceso
async function verificarAcceso(){
  const input = document.getElementById("passBoletas").value.trim();

  if(input === adminPassword){
    localStorage.setItem("adminAuth","ok"); // 🔥 guardar sesión
    document.getElementById("loginBoletas").style.display = "none";
    document.getElementById("contenidoBoletas").style.display = "block";
  } else {
    alert("❌ Contraseña incorrecta");
  }
}

// 🔄 mantener sesión al recargar
function verificarSesion(){
  if(localStorage.getItem("adminAuth") === "ok"){
    document.getElementById("loginBoletas").style.display = "none";
    document.getElementById("contenidoBoletas").style.display = "block";
  }
}

// 🚀 iniciar
document.addEventListener("DOMContentLoaded", async () => {
  await cargarPassword();
  await cargarDatosTienda(); // 👈 ESTA LÍNEA FALTABA
  verificarSesion();
});

function cerrarSesion(){
  localStorage.removeItem("adminAuth");
  location.reload();
}


async function generarBoleta(){

  const numeroFormateado = await obtenerNumeroBoleta();
  const nombre = document.getElementById("clienteNombre").value.trim();
  const dni = document.getElementById("clienteDni").value.trim();
  const direccion = document.getElementById("clienteDireccion").value.trim();
  const celular = document.getElementById("clienteCelular").value.trim();

  if(!nombre || !dni){
    alert("Completa nombre y DNI");
    return;
  }

  // 🛒 obtener carrito
  let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

  if(carrito.length === 0){
    alert("El carrito está vacío");
    return;
  }

  let total = 0;

  let filas = carrito.map(item => {
    const sub = item.p * item.cantidad;
    total += sub;

    return `
      <tr>
        <td>${item.n}</td>
        <td>${item.codigo}</td>
        <td>S/. ${item.p.toFixed(2)}</td>
        <td>${item.cantidad}</td>
        <td>S/. ${sub.toFixed(2)}</td>
      </tr>
    `;
  }).join("");

  // 📅 fecha actual
 const fecha = new Date().toLocaleDateString('es-PE', {
  year: 'numeric',
  month: '2-digit',
  day: '2-digit'
}) + ' ' + new Date().toLocaleTimeString();



// guardar siguiente número

const html = `
<div id="boletaPDF" style="
  background:#fff;
  color:#000;
  padding:15px;
  border-radius:8px;
  font-size:13px;
  width:260px;
  margin:auto;
  font-family:Arial;
">

  <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #000; padding-bottom:8px;">

    <!-- IZQUIERDA: LOGO + NOMBRE -->
    <div style="display:flex; align-items:center; gap:10px;">
      
      ${logoTienda ? `
        <div style="width:60px;height:60px;border-radius:50%;overflow:hidden;border:2px solid #000;">
          <img src="${logoTienda}" style="width:100%;height:100%;object-fit:cover;">
        </div>
      ` : ""}

      <div style="font-size:14px; font-weight:bold;">
        ${nombreTienda}
      </div>

    </div>

    <!-- DERECHA: BOLETA + NUMERO -->
    <div style="text-align:right;">
      <div style="font-size:13px; font-weight:bold;">
        🧾 Boleta de Venta
      </div>
      <div style="font-size:11px;">
        Nº ${numeroFormateado}
      </div>
    </div>

  </div>
    <p><b>Fecha:</b> ${fecha}</p>

    <hr>

    <p><b>Cliente:</b> ${nombre}</p>
    <p><b>DNI:</b> ${dni}</p>
    <p><b>Dirección:</b> ${direccion || '-'}</p>
    <p><b>Celular:</b> ${celular || '-'}</p>

    <hr>

    <table style="width:100%; border-collapse:collapse; font-size:11px;">
      <thead>
        <tr>
          <th style="border-bottom:1px solid #000;">Prod</th>
          <th style="border-bottom:1px solid #000;">Cod</th>
          <th style="border-bottom:1px solid #000;">P</th>
          <th style="border-bottom:1px solid #000;">C</th>
          <th style="border-bottom:1px solid #000;">Sub</th>
        </tr>
      </thead>
      <tbody>
        ${filas}
      </tbody>
    </table>

    <hr>

   <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px;">
  <span>TOTAL</span>
  <span>S/. ${total.toFixed(2)}</span>
</div>

    <p style="text-align:center; font-size:10px;">Gracias por su compra</p>

  </div>
  
`;

  const cont = document.getElementById("boletaResultado");
  cont.innerHTML = html;
  cont.style.display = "block";
  document.getElementById("accionesBoleta").style.display = "block";


try{
  await db.collection("boletas").doc(numeroFormateado).set({
    numero: numeroFormateado,
    cliente: nombre,
    dni: dni,
    direccion: direccion,
    celular: celular,
    fecha: new Date(),
    timestamp: Date.now(),
    total: total,
    productos: carrito,
    estado: "activo",
    html: html
  });

  console.log("Boleta guardada ✅");

}catch(e){
  console.error("Error al guardar ❌", e);
  alert("Error al guardar la boleta");
}
}



function descargarImagen(){
  const boleta = document.getElementById("boletaResultado");

  html2canvas(boleta).then(canvas => {
    const link = document.createElement("a");
    link.download = "boleta.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}

function descargarPDF(){
  const { jsPDF } = window.jspdf;
  const boleta = document.getElementById("boletaResultado");

  html2canvas(boleta).then(canvas => {
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF("p", "mm", "a4");

    const imgWidth = 190;
    const pageHeight = 297;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    let y = 10;

    pdf.addImage(imgData, "PNG", 10, y, imgWidth, imgHeight);
    pdf.save("boleta.pdf");
  });
}


async function cargarDatosTienda(){
  try{
    const doc = await db.collection("config").doc("tienda").get();

    if(doc.exists){
      const data = doc.data();

      // 🔥 detecta automáticamente los nombres de campos
      nombreTienda = data.nombre || data.storeName || "Mi Tienda";
      logoTienda = data.logo || data.storeLogo || "";
    }

  }catch(e){
    console.error(e);
  }

  console.log("Boleta enviada a Firebase");
}

function irHistorial(){
  window.location.href = "historial.html";

  console.log("Guardando boleta:", numeroFormateado);
}


async function obtenerNumeroBoleta(){
  const ref = db.collection("config").doc("contadorBoletas");

  const doc = await ref.get();

  let numero = 1;

  if(doc.exists){
    numero = doc.data().valor + 1;
  }

  await ref.set({ valor: numero });

  return "B-" + numero.toString().padStart(5,"0");
}


</script>
</body>
</html>
